# https://www.reddit.com/r/Ghostty/comments/1hoi3id/my_perfect_ghostty_tmux_nvim_configuration_on/
# https://ianthehenry.com/posts/how-to-configure-tmux/

set -g mouse on
setw -g mode-keys vi

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g set-titles on
set -g set-titles-string '#S'
set -g status-position top
set -g window-status-current-style 'fg=black,bg=green,bold'
set -g window-status-current-format ' #I #W '
set -g window-status-style 'fg=white,bg=default'
set -g window-status-format ' #I #W '
set -g status-style 'fg=white,bg=color236'
set -g status-left ''
set -g status-right '#[fg=black,bg=color245,bold] #S #[default]'
set -g status-right-length 50

# Claude Code.
set -s extended-keys on
set -s focus-events on
set -sa terminal-features 'xterm*:extkeys'
set -sa terminal-features 'xterm*:hyperlinks'
set -g allow-passthrough on
set -s set-clipboard on

# Experimental.
set -g copy-command 'pbcopy'
set -g history-limit 10000
set -g word-separators " '\":,()[]{}<>$@"

# ──────────────────────────────────────────────────────────────────────────────────────────────────
# Keybinds
# ──────────────────────────────────────────────────────────────────────────────────────────────────
# Unbind everything.
unbind -a -T prefix
unbind -a -T root
unbind -a -T copy-mode
# Experimental: Keep default Vim keybinds and just unbind mouse stuff.
# unbind -a -T copy-mode-vi
set -g prefix None

# Windows.
bind -n M-n new-window -c "#{pane_current_path}"
bind -n M-w kill-window
bind -n M-j previous-window
bind -n M-k next-window
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# Panes.
bind -n M-d split-window -h -c "#{pane_current_path}"
bind -n M-D split-window -v -c "#{pane_current_path}"
bind -n M-h select-pane -t :.-
bind -n M-l select-pane -t :.+

# Miscellaneous.
bind -n M-s choose-session
bind -n M-f copy-mode
bind -n M-p command-prompt
bind -n M-r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display-message "Reloaded config"

# Toggle local keybinds off so they pass through to a nested tmux (e.g. over SSH).
bind -T root F12 {
  set key-table off
  set -g status-style 'fg=white,bg=color124'
  if -F '#{pane_in_mode}' 'send-keys -X cancel'
  refresh-client -S
}
bind -T off F12 {
  set -u key-table
  set -g status-style 'fg=white,bg=color236'
  refresh-client -S
}

# ──────────────────────────────────────────────────────────────────────────────────────────────────
# Mouse
# ──────────────────────────────────────────────────────────────────────────────────────────────────
# Unbind mouse stuff in copy-mode-vi.
unbind -T copy-mode-vi MouseDown1Pane
unbind -T copy-mode-vi MouseDrag1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode-vi WheelUpPane
unbind -T copy-mode-vi WheelDownPane
unbind -T copy-mode-vi DoubleClick1Pane
unbind -T copy-mode-vi TripleClick1Pane

# Scroll.
bind -T root         WheelUpPane   { if -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' { send -M } { if -F '#{alternate_on}' { send -N1 Up   } { copy-mode -e } } }
bind -T root         WheelDownPane { if -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' { send -M } { if -F '#{alternate_on}' { send -N1 Down } { send -M } } }
bind -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

# Single click.
bind -T root         MouseDrag1Pane    { if -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' { send -M } { copy-mode -M } }
bind -T copy-mode-vi MouseDrag1Pane    select-pane \; send-keys -X begin-selection
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection

# Double click.
bind -T root         SecondClick1Pane { select-pane -t=; if -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' { send -M } { copy-mode -H; send -X select-word; send -X stop-selection } }
bind -T copy-mode-vi SecondClick1Pane { select-pane; send -X select-word; send -X stop-selection }

# Triple click.
bind -T root         TripleClick1Pane { select-pane -t=; if -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' { send -M } { copy-mode -H; send -X select-line; send -X stop-selection } }
bind -T copy-mode-vi TripleClick1Pane { select-pane; send -X select-line; send -X stop-selection }

# Miscellaneous.
bind -n MouseDown1Pane   select-pane -t=\; send -M
bind -n MouseDrag1Border resize-pane -M
